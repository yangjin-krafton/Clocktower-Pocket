<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>통합 — 원형 전체보기 + 3D 돌림판 (원작 공식 팔레트)</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=Noto+Sans+KR:wght@400;500;700&display=swap');

/*
  ┌──────────────────────────────────────────────────┐
  │  Blood on the Clocktower 원작 보드게임 공식 팔레트  │
  │  보라  Base:#7A6FB7  Light:#9B93C9  Dark:#5C5389  │
  │  청록  Base:#5BB3C6  Light:#84C6D4  Dark:#448694  │
  │  레드  Base:#6E1B1F  Light:#925457  Dark:#521417  │
  │  블루  Base:#2E4A8F  Light:#6277AB  Dark:#22386B  │
  └──────────────────────────────────────────────────┘
*/
:root {
  /* 배경 계층 (공식 색상에서 파생한 극암 값) */
  --bg:       #0b0a18;
  --surface:  #14122a;
  --surface2: #1c1a36;
  --lead:     #0a0916;
  --lead2:    #1a183a;

  /* 보라 (Purple) */
  --pu-base:  #7A6FB7;
  --pu-light: #9B93C9;
  --pu-dark:  #5C5389;

  /* 청록 (Teal) */
  --tl-base:  #5BB3C6;
  --tl-light: #84C6D4;
  --tl-dark:  #448694;

  /* 레드 (Red) */
  --rd-base:  #6E1B1F;
  --rd-light: #925457;
  --rd-dark:  #521417;

  /* 블루 (Blue) */
  --bl-base:  #2E4A8F;
  --bl-light: #6277AB;
  --bl-dark:  #22386B;

  /* 골드 (그리모어 금장) */
  --gold:     #d4a828;
  --gold2:    #f0cc60;

  /* 텍스트 */
  --text:     #EAE6F8;
  --text2:    #9B93C9;   /* = pu-light */
  --text3:    #7A6FB7;   /* = pu-base */
  --text4:    #3d3868;

  /* 역할 타입 색상 */
  --town:     #2E4A8F;   /* 블루 */
  --outside:  #5BB3C6;   /* 청록 */
  --minion:   #6E1B1F;   /* 레드 */
  --demon:    #521417;   /* 레드 다크 */
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { height:100%; background:#000; }
body {
  display:flex; justify-content:center; align-items:flex-start;
  padding:12px 0;
  /* 블루-보라 배경 그라디언트 */
  background:radial-gradient(ellipse at 50% 0%, #1a1848 0%, #070510 60%);
  font-family:'Noto Sans KR', sans-serif;
}

/* ── 폰 프레임 ── */
.phone {
  width:375px; min-height:812px;
  background:var(--bg); color:var(--text);
  display:flex; flex-direction:column;
  border-radius:40px; overflow:hidden;
  /* 보라 테두리 발광 */
  box-shadow:0 0 0 1px #3a3570, 0 0 24px rgba(122,111,183,0.22), 0 24px 70px rgba(0,0,0,0.9);
  position:relative;
}
.phone::before {
  content:''; position:absolute; inset:0;
  background:radial-gradient(ellipse 80% 40% at 50% 0%, rgba(122,111,183,0.16) 0%, transparent 55%);
  pointer-events:none; z-index:0;
}

/* ── 상태바 ── */
.status-bar {
  height:44px; padding:14px 24px 0; flex-shrink:0;
  display:flex; justify-content:space-between; align-items:center;
  font-size:0.72rem; font-weight:600; color:var(--text4);
  position:relative; z-index:3;
}

/* ── 헤더 ── */
.header {
  flex-shrink:0; position:relative; z-index:3;
  padding:0 16px 10px;
  display:flex; align-items:center; gap:10px;
  border-bottom:1px solid var(--lead2);
}
/* 4색 분할 장식선: 블루 → 보라 → 청록 → 보라 → 레드 */
.header::after {
  content:''; position:absolute; bottom:-1px; left:8%; right:8%; height:1px;
  background:linear-gradient(90deg,
    transparent,
    var(--bl-dark)  12%,
    var(--pu-base)  30%,
    var(--tl-base)  50%,
    var(--pu-base)  70%,
    var(--rd-dark)  88%,
    transparent
  );
}

/* 뷰 토글 */
.view-toggle {
  display:flex; gap:4px;
  background:var(--lead); border-radius:8px; padding:3px;
  flex-shrink:0;
}
.vtab {
  padding:6px 12px; border-radius:6px;
  font-size:0.72rem; font-weight:600; cursor:pointer;
  color:var(--text3); border:none; background:transparent;
  transition:all 0.2s; white-space:nowrap;
}
.vtab.active {
  background:var(--surface2);
  color:var(--text);
  box-shadow:0 1px 4px rgba(0,0,0,0.4);
}
/* 돌림판 활성: 청록 */
.vtab.active.dial-tab { color:var(--tl-light); }
/* 전체보기 활성: 골드 */
.vtab.active.ring-tab { color:var(--gold2); }

.header-right {
  flex:1; text-align:right;
  display:flex; flex-direction:column; align-items:flex-end; gap:2px;
}
.phase-pill {
  display:flex; align-items:center; gap:5px;
  padding:4px 10px; border-radius:12px;
  /* 보라 배경 */
  background:rgba(92,83,137,0.15); border:1px solid rgba(92,83,137,0.3);
  font-size:0.65rem; font-weight:500; color:var(--text2);
}
.phase-dot {
  width:6px; height:6px; border-radius:50%;
  background:var(--pu-base);
  box-shadow:0 0 5px var(--pu-dark);
}
.survivor-txt { font-size:0.6rem; color:var(--text4); }

/* ── 인원 선택 탭 ── */
.count-bar {
  flex-shrink:0; z-index:3; position:relative;
  display:flex; gap:5px; padding:7px 16px;
  background:var(--surface); border-bottom:1px solid var(--lead2);
}
.ctab {
  flex:1; padding:5px 2px; border-radius:6px;
  border:1px solid var(--lead2); background:transparent;
  color:var(--text3); font-size:0.69rem; font-weight:500; cursor:pointer; text-align:center;
  transition:all 0.15s;
}
/* 활성: 보라 */
.ctab.active { background:rgba(122,111,183,0.2); border-color:rgba(122,111,183,0.5); color:var(--text2); }

/* ── 그리모어 영역 ── */
.grimoire-area {
  flex:1; position:relative; z-index:1;
  overflow:hidden; min-height:0;
}

/* ─── 전체 보기 (링) ─── */
#viewAll {
  position:absolute; inset:0;
  display:flex; align-items:center; justify-content:center;
  transition:opacity 0.3s ease, transform 0.3s ease;
}
#viewAll.hidden {
  opacity:0; transform:scale(0.93); pointer-events:none;
}

.ring-wrap {
  position:relative; width:320px; height:320px; flex-shrink:0;
}
.ring-guide {
  position:absolute; top:50%; left:50%;
  border-radius:50%;
  /* 보라-다크 점선 */
  border:1px dashed rgba(92,83,137,0.3);
  transform:translate(-50%,-50%); pointer-events:none;
}
.ring-hub {
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  width:66px; height:66px; border-radius:50%; z-index:2;
  /* 깊은 블루-보라 그라디언트 */
  background:radial-gradient(circle, #1e1c40 0%, #08091a 100%);
  border:2px solid var(--lead2);
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px;
  /* 청록+보라 복합 발광 */
  box-shadow:0 0 18px rgba(91,179,198,0.25), 0 0 8px rgba(122,111,183,0.2);
}
.hub-n   { font-family:'Noto Serif KR', serif; font-size:1.1rem; font-weight:700; color:var(--gold2); line-height:1; }
.hub-lbl { font-size:0.38rem; color:var(--text3); letter-spacing:0.08em; }

/* 링 플레이어 토큰 */
.rtoken {
  position:absolute; transform:translate(-50%,-50%);
  display:flex; flex-direction:column; align-items:center; gap:2px;
  cursor:pointer; z-index:3;
  transition:all 0.3s ease;
}
.rtoken-gem {
  border-radius:50%; border:2px solid var(--lead);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  position:relative;
  box-shadow:0 2px 6px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.1);
  transition:all 0.3s;
}
.rtoken-gem::after { content:''; position:absolute; top:18%; left:22%; width:28%; height:13%; background:rgba(255,255,255,0.22); border-radius:50%; transform:rotate(-25deg); }

/* 역할별 보석 — 공식 4색 팔레트 적용 */
.rtoken-gem.town    { background:radial-gradient(circle at 35% 30%, #6277AB, #22386B); box-shadow:0 2px 6px rgba(0,0,0,0.7), 0 0 8px rgba(46,74,143,0.3); }
.rtoken-gem.outside { background:radial-gradient(circle at 35% 30%, #84C6D4, #448694); box-shadow:0 2px 6px rgba(0,0,0,0.7), 0 0 6px rgba(91,179,198,0.3); }
.rtoken-gem.minion  { background:radial-gradient(circle at 35% 30%, #925457, #521417); box-shadow:0 2px 6px rgba(0,0,0,0.7), 0 0 8px rgba(110,27,31,0.35); }
.rtoken-gem.demon   { background:radial-gradient(circle at 35% 30%, #6E1B1F, #280608); box-shadow:0 2px 6px rgba(0,0,0,0.7), 0 0 10px rgba(110,27,31,0.5); }
.rtoken-gem.dead    { background:radial-gradient(circle at 35% 30%, #262240, #0c0c20); opacity:0.4; filter:grayscale(0.8); }

/* 선택됨 — 골드 + 청록 */
.rtoken.sel .rtoken-gem {
  border-color:var(--gold) !important;
  box-shadow:0 0 16px rgba(212,168,40,0.65), 0 0 28px rgba(91,179,198,0.4), 0 2px 6px rgba(0,0,0,0.7) !important;
}
.rtoken.dimmed { opacity:0.25; }

.rtoken-icon { line-height:1; }
.rtoken-role { color:rgba(255,255,255,0.88); text-align:center; padding:0 2px; line-height:1.2; }
.rtoken-name { color:var(--text2); text-align:center; }

.ring-tap-hint {
  position:absolute; bottom:14px; left:50%; transform:translateX(-50%);
  font-size:0.6rem; color:var(--text4); white-space:nowrap;
  pointer-events:none;
}

/* ─── 3D 돌림판 뷰 ─── */
#viewDial {
  position:absolute; inset:0;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:0;
  opacity:0; transform:scale(1.04);
  transition:opacity 0.3s ease, transform 0.3s ease;
  pointer-events:none;
}
#viewDial.visible {
  opacity:1; transform:scale(1); pointer-events:all;
}

/* 이웃 방향 표시 */
.nbr-row {
  flex-shrink:0; width:100%;
  display:flex; justify-content:space-between; padding:0 20px;
  margin-bottom:6px;
}
.nbr-box {
  display:flex; align-items:center; gap:5px;
  background:var(--surface); border:1px solid var(--lead2);
  border-radius:16px; padding:4px 10px;
  font-size:0.65rem;
}
/* 보라-다크 화살표 */
.nbr-arrow { color:var(--pu-dark); font-size:0.8rem; }
.nbr-lbl   { color:var(--text3); font-size:0.58rem; }
.nbr-name  { color:var(--text2); font-weight:600; }

/* 3D 무대 */
.dial-stage {
  flex-shrink:0;
  width:100%; height:210px;
  perspective:520px;
  display:flex; align-items:center; justify-content:center;
  overflow:hidden; position:relative;
}
/* 청록 앞쪽 후광 */
.dial-stage::after {
  content:''; position:absolute; bottom:0; left:50%; transform:translateX(-50%);
  width:100px; height:36px;
  background:radial-gradient(ellipse, rgba(91,179,198,0.16) 0%, transparent 70%);
  pointer-events:none;
}

.dial-ring {
  position:relative; width:64px; height:84px;
  transform-style:preserve-3d;
}

.dslot {
  position:absolute; width:64px; height:84px;
  display:flex; flex-direction:column; align-items:center; gap:3px;
  backface-visibility:hidden;
  cursor:pointer;
}

.dslot-gem {
  border-radius:50%; border:2px solid var(--lead);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  position:relative; flex-shrink:0;
  box-shadow:0 3px 10px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.12);
  transition:box-shadow 0.3s;
}
.dslot-gem::after { content:''; position:absolute; top:18%; left:22%; width:28%; height:13%; background:rgba(255,255,255,0.22); border-radius:50%; transform:rotate(-25deg); }

/* 돌림판 보석 — 공식 4색 */
.dslot-gem.town    { background:radial-gradient(circle at 35% 30%, #6277AB, #22386B); }
.dslot-gem.outside { background:radial-gradient(circle at 35% 30%, #84C6D4, #448694); }
.dslot-gem.minion  { background:radial-gradient(circle at 35% 30%, #925457, #521417); }
.dslot-gem.demon   { background:radial-gradient(circle at 35% 30%, #6E1B1F, #280608); }
.dslot-gem.dead    { background:radial-gradient(circle at 35% 30%, #262240, #0c0c20); opacity:0.45; filter:grayscale(0.8); }

/* 중앙 슬롯 — 골드+청록 발광 */
.dslot.center-slot .dslot-gem {
  border-color:var(--gold);
  box-shadow:0 0 20px rgba(212,168,40,0.6), 0 0 36px rgba(91,179,198,0.28), 0 4px 12px rgba(0,0,0,0.8);
}

@keyframes snapPop {
  0%   { transform:scale(1); }
  45%  { transform:scale(1.1); }
  100% { transform:scale(1); }
}
.snap-pop { animation:snapPop 0.22s ease-out; }

.ds-icon { font-size:1.1rem; line-height:1; }
.ds-role { font-size:0.35rem; color:rgba(255,255,255,0.88); text-align:center; padding:0 2px; }
.ds-name { font-size:0.62rem; color:var(--text2); text-shadow:0 1px 4px rgba(0,0,0,0.9); }

.center-slot .ds-badge {
  position:absolute; top:-3px; right:-3px;
  width:14px; height:14px; border-radius:50%;
  border:2px solid var(--bg);
  display:flex; align-items:center; justify-content:center;
  font-size:0.44rem;
}
.badge-poison { background:#16a34a; }
.badge-dead   { background:#374151; }

/* 회전 네비게이션 */
.dial-nav {
  flex-shrink:0; width:100%;
  display:flex; align-items:center; gap:10px;
  padding:6px 20px 0;
}
.dnav-btn {
  width:44px; height:44px; border-radius:50%;
  /* 보라-다크 테두리 */
  border:1px solid rgba(92,83,137,0.4);
  background:rgba(20,18,42,0.9); color:var(--text2);
  font-size:1.1rem; cursor:pointer; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  transition:all 0.15s;
}
.dnav-btn:active { background:rgba(92,83,137,0.4); transform:scale(0.92); }
.dnav-center { flex:1; text-align:center; }
.dnav-name { font-family:'Noto Serif KR', serif; font-size:1rem; font-weight:700; color:var(--text); }
.dnav-role { font-size:0.65rem; color:var(--text3); margin-top:1px; }

/* 위치 도트 */
.pos-dots {
  flex-shrink:0;
  display:flex; justify-content:center; align-items:center; gap:4px;
  padding:8px 20px 2px;
  flex-wrap:wrap;
  max-height:28px; overflow:hidden;
}
.pdot {
  width:6px; height:6px; border-radius:50%;
  background:var(--lead2); cursor:pointer;
  transition:all 0.25s; flex-shrink:0;
}
/* 블루 = 마을 생존 */
.pdot.alive  { background:rgba(46,74,143,0.55); }
/* 레드-라이트 = 미니언 */
.pdot.evil   { background:rgba(146,84,87,0.65); }
/* 레드 = 데몬 */
.pdot.demon  { background:rgba(110,27,31,0.75); }
.pdot.dead   { background:var(--lead2); }
/* 현재 위치 = 골드 */
.pdot.cur    { background:var(--gold) !important; transform:scale(1.7); box-shadow:0 0 5px var(--gold); }

.wrap-hint {
  flex-shrink:0; text-align:center;
  font-size:0.58rem; color:var(--text4); padding:2px 0;
}

/* ── 하단 시트 ── */
.bottom-sheet {
  flex-shrink:0; position:relative; z-index:2;
  background:var(--surface); border-top:2px solid var(--lead);
}
/* 동일한 4색 장식선 */
.bottom-sheet::before {
  content:''; position:absolute; top:-2px; left:5%; right:5%; height:2px;
  background:linear-gradient(90deg,
    transparent,
    var(--bl-dark)  12%,
    var(--pu-base)  30%,
    var(--tl-base)  50%,
    var(--pu-base)  70%,
    var(--rd-dark)  88%,
    transparent
  );
}
.sheet-handle { width:36px; height:4px; background:var(--lead2); border-radius:2px; margin:8px auto 0; }
.sheet-body { padding:8px 18px 12px; }

.sel-row { display:flex; align-items:center; gap:10px; margin-bottom:8px; }
.sel-icon { font-size:1.4rem; }
.sel-meta { flex:1; min-width:0; }
.sel-name { font-family:'Noto Serif KR', serif; font-size:0.88rem; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.sel-role { font-size:0.67rem; color:var(--text3); margin-top:2px; font-style:italic; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.sel-tag  { padding:3px 8px; border-radius:2px; font-size:0.64rem; font-weight:600; font-family:'Noto Serif KR', serif; border:1px solid; white-space:nowrap; flex-shrink:0; }

.ability-line {
  padding:7px 10px; margin-bottom:8px;
  background:var(--surface2); border-radius:6px; border:1px solid var(--lead2);
  font-size:0.7rem; color:var(--text2); line-height:1.5;
}
.ability-line strong { color:var(--text); }

.btn-grid { display:grid; grid-template-columns:1fr 1fr; gap:6px; }
.abtn {
  padding:10px; border-radius:4px;
  /* 보라-다크 테두리 */
  border:1px solid rgba(92,83,137,0.35);
  background:var(--surface2); color:var(--text2);
  font-family:'Noto Sans KR', sans-serif; font-size:0.7rem; font-weight:500;
  cursor:pointer; min-height:44px;
  display:flex; align-items:center; justify-content:center; gap:5px;
}
.abtn:active { opacity:0.7; }
/* 위험 액션 — 레드 */
.abtn.red { border-color:rgba(110,27,31,0.5); color:var(--rd-light); }
/* 낮 전환 — 청록 (긍정적 액션) */
.abtn.mag { border-color:rgba(91,179,198,0.4); color:var(--tl-light); background:rgba(91,179,198,0.07); grid-column:1/-1; }

/* ── 탭바 ── */
.tab-bar {
  height:56px; flex-shrink:0; position:relative; z-index:3;
  background:var(--surface); border-top:2px solid var(--lead); display:flex;
}
.tab-bar::before {
  content:''; position:absolute; top:-2px; left:0; right:0; height:2px;
  background:linear-gradient(90deg,
    transparent,
    var(--bl-dark)  12%,
    var(--pu-base)  30%,
    var(--tl-base)  50%,
    var(--pu-base)  70%,
    var(--rd-dark)  88%,
    transparent
  );
}
.tab { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; opacity:0.35; cursor:pointer; min-height:44px; }
.tab.on { opacity:1; }
.ti { font-size:1rem; }
.tl { font-size:0.56rem; color:var(--text3); }
/* 활성 탭 — 청록 */
.tab.on .tl { color:var(--tl-base); }
</style>
</head>
<body>
<div class="phone">

  <div class="status-bar">
    <span>21:34</span>
    <span style="font-size:0.8rem;">📶 🔋</span>
  </div>

  <div class="header">
    <div class="view-toggle">
      <button class="vtab ring-tab active" id="vtabAll"  onclick="setView('all')">🔵 전체 보기</button>
      <button class="vtab dial-tab"        id="vtabDial" onclick="setView('dial')">🎡 돌림판</button>
    </div>
    <div class="header-right">
      <div class="phase-pill"><div class="phase-dot"></div><span>밤 2</span></div>
      <div class="survivor-txt" id="survivorTxt">생존 — / 전체 —명</div>
    </div>
  </div>

  <div class="count-bar">
    <button class="ctab"        onclick="setCount(5)">5인</button>
    <button class="ctab active" onclick="setCount(10)">10인</button>
    <button class="ctab"        onclick="setCount(15)">15인</button>
    <button class="ctab"        onclick="setCount(20)">20인</button>
  </div>

  <div class="grimoire-area">

    <div id="viewAll">
      <div class="ring-wrap" id="ringWrap">
        <div class="ring-guide" id="ringGuide"></div>
        <div class="ring-hub">
          <div class="hub-n" id="hubN">10</div>
          <div class="hub-lbl">전체 인원</div>
        </div>
      </div>
      <div class="ring-tap-hint">토큰을 탭하면 돌림판으로 전환됩니다</div>
    </div>

    <div id="viewDial">
      <div class="nbr-row">
        <div class="nbr-box">
          <span class="nbr-arrow">◀</span>
          <span class="nbr-lbl">좌측</span>
          <span class="nbr-name" id="nbrLeft">—</span>
        </div>
        <div class="nbr-box">
          <span class="nbr-name" id="nbrRight">—</span>
          <span class="nbr-lbl">우측</span>
          <span class="nbr-arrow">▶</span>
        </div>
      </div>

      <div class="dial-stage"
        ontouchstart="dTouchStart(event)"
        ontouchend="dTouchEnd(event)">
        <div class="dial-ring" id="dialRing"></div>
      </div>

      <div class="dial-nav">
        <button class="dnav-btn" onclick="rotateDial(-1)">◀</button>
        <div class="dnav-center">
          <div class="dnav-name" id="dialFocusName">—</div>
          <div class="dnav-role" id="dialFocusRole">—</div>
        </div>
        <button class="dnav-btn" onclick="rotateDial(+1)">▶</button>
      </div>

      <div class="pos-dots" id="posDots"></div>
      <div class="wrap-hint" id="wrapHint">↻ 마지막 자리 다음은 첫 번째 자리</div>
    </div>
  </div>

  <div class="bottom-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-body">
      <div class="sel-row">
        <span class="sel-icon" id="sIcon">—</span>
        <div class="sel-meta">
          <div class="sel-name" id="sName">—</div>
          <div class="sel-role" id="sRole">—</div>
        </div>
        <span class="sel-tag" id="sTag">—</span>
      </div>
      <div class="ability-line" id="sAbility">—</div>
      <div class="btn-grid">
        <button class="abtn red">⚔ 처치 확정</button>
        <button class="abtn">✉ 정보 전달</button>
        <button class="abtn red">💀 사망 처리</button>
        <button class="abtn">⚙ 상태 변경</button>
        <button class="abtn mag">🌅 낮으로 전환</button>
      </div>
    </div>
  </div>

  <div class="tab-bar">
    <div class="tab on"><span class="ti">📖</span><span class="tl">그리모어</span></div>
    <div class="tab"><span class="ti">🌙</span><span class="tl">밤 순서</span></div>
    <div class="tab"><span class="ti">📜</span><span class="tl">기록부</span></div>
    <div class="tab"><span class="ti">⚙️</span><span class="tl">설정</span></div>
  </div>

</div>

<script>
const ALL_PLAYERS = [
  { name:'민준', role:'점술사',      icon:'🔮', type:'town',    ability:'매 밤 2명을 선택해 둘 중 데몬 포함 여부를 안다. 선 플레이어 1명은 항상 데몬처럼 잡힌다.', dead:false },
  { name:'서연', role:'학살자',      icon:'🗡️', type:'town',    ability:'게임 중 1회, 낮에 1명 지목. 그 대상이 데몬이면 즉시 사망한다.', dead:false },
  { name:'지호', role:'술꾼',        icon:'🍾', type:'outside', ability:'본인은 마을 주민이라 믿지만, 실제로는 아웃사이더이며 능력이 오작동한다.', dead:false },
  { name:'하은', role:'탐정',        icon:'🔍', type:'town',    ability:'첫날 밤, 두 플레이어 중 한 명이 특정 미니언임을 안다.', dead:true },
  { name:'준서', role:'스파이',      icon:'🕵️', type:'minion',  ability:'그리모어 전체 정보를 볼 수 있다. 선 팀으로 등록될 수 있다.', dead:false },
  { name:'수아', role:'공감자',      icon:'🧪', type:'town',    ability:'매 밤, 양옆 이웃 중 악 플레이어의 수(0/1/2)를 안다.', dead:false, poisoned:true },
  { name:'도윤', role:'수도사',      icon:'🙏', type:'town',    ability:'매 밤 1명을 보호해 데몬 공격으로부터 지킨다.', dead:true },
  { name:'예린', role:'임프',        icon:'👿', type:'demon',   ability:'매 밤(첫밤 제외) 1명을 처치한다. 자신을 처치하면 살아있는 미니언이 새 임프가 된다.', dead:false },
  { name:'현우', role:'독살자',      icon:'☠️', type:'minion',  ability:'매 밤 1명을 중독시킨다. 중독된 플레이어의 능력이 오작동한다.', dead:false },
  { name:'나은', role:'빨래꾼',      icon:'👁️', type:'town',    ability:'첫날 밤, 두 플레이어 중 한 명이 특정 마을 주민임을 안다.', dead:false },
  { name:'태양', role:'요리사',      icon:'👨‍🍳',type:'town',   ability:'첫날 밤, 서로 이웃한 악 플레이어 쌍의 수를 안다.', dead:false },
  { name:'지우', role:'은둔자',      icon:'🧎', type:'outside', ability:'선 팀이지만 악 팀 또는 데몬으로 등록될 수 있다.', dead:false },
  { name:'민서', role:'처녀',        icon:'👼', type:'town',    ability:'처음으로 자신을 지목한 사람이 마을 주민이면, 그 지목자가 즉시 처형될 수 있다.', dead:false },
  { name:'하준', role:'남작',        icon:'🎭', type:'minion',  ability:'게임 시작 시 아웃사이더 수를 2명 더 늘린다.', dead:false },
  { name:'소연', role:'병사',        icon:'🛡️', type:'town',    ability:'데몬 공격으로는 죽지 않는다.', dead:false },
  { name:'재원', role:'장의사',      icon:'⚰️', type:'town',    ability:'매 밤, 전날 처형된 플레이어의 실제 역할을 안다.', dead:false },
  { name:'다인', role:'성인',        icon:'😇', type:'outside', ability:'성인이 처형되면 선 팀이 즉시 패배한다.', dead:false },
  { name:'성호', role:'시장',        icon:'🎩', type:'town',    ability:'최종 3인에서 처형 없이 낮이 끝나면 선 팀이 승리할 수 있다.', dead:false },
  { name:'미래', role:'집사',        icon:'🫅', type:'outside', ability:'지정한 주인이 투표하지 않으면 자신도 투표할 수 없다.', dead:false },
  { name:'준혁', role:'스칼렛 우먼', icon:'💋', type:'minion',  ability:'생존자 5명 이상일 때 데몬이 죽으면 자신이 새 데몬으로 승계된다.', dead:false },
];

/* 공식 팔레트 기반 역할 태그 색상 */
const TAG = {
  town:    { l:'마을',      bg:'rgba(46,74,143,0.15)',   c:'#6277AB', b:'rgba(46,74,143,0.4)' },
  outside: { l:'아웃사이더', bg:'rgba(91,179,198,0.15)', c:'#5BB3C6', b:'rgba(91,179,198,0.4)' },
  minion:  { l:'미니언',    bg:'rgba(146,84,87,0.15)',   c:'#925457', b:'rgba(110,27,31,0.4)' },
  demon:   { l:'데몬',      bg:'rgba(110,27,31,0.2)',    c:'#925457', b:'rgba(110,27,31,0.5)' },
};

let N = 10, selected = 0, viewMode = 'all', isAnimating = false;
function mod(n, m) { return ((n % m) + m) % m; }
function ps() { return ALL_PLAYERS.slice(0, N); }

/* ── 링 ── */
function getTokenSize(n) {
  if (n <= 5) return 56; if (n <= 8) return 48;
  if (n <= 11) return 40; if (n <= 15) return 32; return 25;
}
function getRingRadius(n) {
  if (n <= 5) return 98; if (n <= 8) return 114;
  if (n <= 11) return 122; if (n <= 15) return 128; return 133;
}

function buildRing() {
  const wrap = document.getElementById('ringWrap');
  const players = ps();
  const sz = getTokenSize(N), R = getRingRadius(N);
  const cx = 160, cy = 160;
  const showName = N <= 13, showRole = N <= 7;

  wrap.querySelectorAll('.rtoken').forEach(el => el.remove());
  document.getElementById('hubN').textContent = N;
  document.getElementById('survivorTxt').textContent = `생존 ${players.filter(p=>!p.dead).length} / 전체 ${N}명`;

  const guide = document.getElementById('ringGuide');
  guide.style.width = guide.style.height = (R * 2) + 'px';
  guide.style.marginLeft = guide.style.marginTop = '-' + R + 'px';

  const fontSize = sz >= 48 ? '1rem' : sz >= 38 ? '0.82rem' : sz >= 30 ? '0.66rem' : '0.52rem';
  const nameFontSize = Math.max(0.48, sz * 0.011) + 'rem';

  players.forEach((p, i) => {
    const angle = (i / N) * Math.PI * 2 - Math.PI / 2;
    const x = cx + R * Math.cos(angle), y = cy + R * Math.sin(angle);
    const el = document.createElement('div');
    el.className = 'rtoken' + (i === selected ? ' sel' : '');
    el.style.left = x + 'px'; el.style.top = y + 'px';
    const gemClass = p.dead ? 'dead' : p.type;
    el.innerHTML = `
      <div class="rtoken-gem ${gemClass}" style="width:${sz}px;height:${sz}px;">
        <span class="rtoken-icon" style="font-size:${fontSize}">${p.icon}</span>
        ${showRole ? `<span class="rtoken-role">${p.role}</span>` : ''}
      </div>
      ${showName ? `<span class="rtoken-name" style="font-size:${nameFontSize}">${p.name}</span>` : ''}
    `;
    el.addEventListener('click', () => {
      selected = i; buildRing(); updateInfo();
      setTimeout(() => setView('dial'), 120);
    });
    wrap.appendChild(el);
  });
}

/* ── 돌림판 (360° ÷ 15 = 24° 등분) ── */
const SLOT_ANGLES    = [-72, -48, -24, 0, 24, 48, 72];
const SLOT_OPACITIES = [0.18, 0.60, 0.86, 1.0, 0.86, 0.60, 0.18];
const DIAL_RADIUS    = 148;

function initSlots() {
  const ring = document.getElementById('dialRing');
  ring.innerHTML = '';
  SLOT_ANGLES.forEach((angle, i) => {
    const slot = document.createElement('div');
    slot.className = 'dslot';
    slot.id = 'dslot' + i;
    slot.style.transform = `rotateY(${angle}deg) translateZ(${DIAL_RADIUS}px)`;
    slot.style.opacity   = SLOT_OPACITIES[i];
    if (i === 3) slot.classList.add('center-slot');
    slot.addEventListener('click', () => {
      if (isAnimating) return;
      const offset = i - 3;
      if (offset === 0) return;
      let steps = 0;
      function step() {
        if (steps < Math.abs(offset)) { rotateDial(Math.sign(offset)); steps++; setTimeout(step, 460); }
      }
      step();
    });
    ring.appendChild(slot);
  });
}

function updateSlotContent() {
  const players = ps();
  SLOT_ANGLES.forEach((_, i) => {
    const offset = i - 3, idx = mod(selected + offset, N), p = players[idx];
    const isCenter = (i === 3);
    const slot = document.getElementById('dslot' + i);
    if (!slot) return;
    const gemSz = isCenter ? 60 : (Math.abs(offset) === 1 ? 50 : 40);
    const gemClass = p.dead ? 'dead' : p.type;
    const showRole = Math.abs(offset) <= 1;
    let badgeHTML = '';
    if (isCenter && p.poisoned) badgeHTML = '<div class="ds-badge badge-poison">☠</div>';
    else if (isCenter && p.dead) badgeHTML = '<div class="ds-badge badge-dead">✕</div>';
    slot.innerHTML = `
      <div class="dslot-gem ${gemClass}" style="width:${gemSz}px;height:${gemSz}px;">
        ${badgeHTML}
        <span class="ds-icon" style="font-size:${isCenter?'1.3rem':'1rem'}">${p.icon}</span>
        ${showRole ? `<span class="ds-role">${p.role}</span>` : ''}
      </div>
      <span class="ds-name">${p.name}</span>
    `;
  });
  updateDialInfo();
}

function updateDialInfo() {
  const players = ps();
  const p = players[selected], pPrev = players[mod(selected-1,N)], pNext = players[mod(selected+1,N)];
  document.getElementById('nbrLeft').textContent     = pPrev.name;
  document.getElementById('nbrRight').textContent    = pNext.name;
  document.getElementById('dialFocusName').textContent = p.name;
  document.getElementById('dialFocusRole').textContent = `${p.role} · ${selected + 1}번 자리`;
  const wrapHint = document.getElementById('wrapHint');
  if (selected === 0 || selected === N - 1) {
    /* 순환 지점 강조 — 청록 */
    wrapHint.style.color = 'rgba(91,179,198,0.65)';
    wrapHint.textContent = selected === 0
      ? `↺ 첫 번째 자리 (왼쪽 이웃: ${N}번째 ${pPrev.name})`
      : `↻ 마지막 자리 (오른쪽 이웃: 1번째 ${pNext.name})`;
  } else {
    wrapHint.style.color = 'var(--text4)';
    wrapHint.textContent = '↻ 마지막 자리 다음은 첫 번째 자리';
  }
  buildPosDots();
}

function buildPosDots() {
  const players = ps();
  const cont = document.getElementById('posDots');
  cont.innerHTML = '';
  players.forEach((p, i) => {
    const d = document.createElement('div');
    let cls = 'pdot';
    if (p.dead) cls += ' dead';
    else if (p.type === 'demon') cls += ' demon';
    else if (p.type === 'minion') cls += ' evil';
    else cls += ' alive';
    if (i === selected) cls += ' cur';
    d.className = cls; d.title = p.name;
    d.addEventListener('click', () => jumpToDot(i));
    cont.appendChild(d);
  });
}

function jumpToDot(idx) {
  if (isAnimating) return;
  selected = idx; updateSlotContent(); updateInfo(); buildRing();
}

function rotateDial(dir) {
  if (isAnimating) return;
  isAnimating = true;
  const ring = document.getElementById('dialRing');
  const DEG  = 24; // 360° ÷ 15

  ring.style.transition = 'transform 0.42s cubic-bezier(0.25, 0.46, 0.45, 0.94)';
  ring.style.transform  = `rotateY(${-dir * DEG}deg)`;

  setTimeout(() => {
    ring.style.transition = 'none';
    ring.style.transform  = 'rotateY(0deg)';
    selected = mod(selected + dir, N);
    updateSlotContent(); updateInfo(); buildRing();
    const centerGem = document.querySelector('#dslot3 .dslot-gem');
    if (centerGem) { centerGem.classList.remove('snap-pop'); void centerGem.offsetWidth; centerGem.classList.add('snap-pop'); }
    setTimeout(() => {
      ring.style.transition = 'transform 0.42s cubic-bezier(0.25, 0.46, 0.45, 0.94)';
      isAnimating = false;
    }, 30);
  }, 440);
}

let dTouchX = 0;
function dTouchStart(e) { dTouchX = e.touches[0].clientX; }
function dTouchEnd(e) {
  const dx = e.changedTouches[0].clientX - dTouchX;
  if (Math.abs(dx) > 44) rotateDial(dx < 0 ? +1 : -1);
}

function setView(mode) {
  viewMode = mode;
  document.getElementById('viewAll').classList.toggle('hidden', mode !== 'all');
  document.getElementById('viewDial').classList.toggle('visible', mode === 'dial');
  document.getElementById('vtabAll').classList.toggle('active', mode === 'all');
  document.getElementById('vtabDial').classList.toggle('active', mode === 'dial');
  if (mode === 'dial') updateSlotContent();
}

function updateInfo() {
  const p = ps()[selected], ti = TAG[p.type];
  document.getElementById('sIcon').textContent    = p.icon;
  document.getElementById('sName').textContent    = p.name;
  document.getElementById('sRole').textContent    = `${p.role} · ${selected + 1}번 자리 · ${p.dead ? '사망' : '생존'}`;
  document.getElementById('sAbility').innerHTML   = `<strong>${p.role}:</strong> ${p.ability}`;
  const tag = document.getElementById('sTag');
  tag.textContent = ti.l; tag.style.background = ti.bg;
  tag.style.color = ti.c; tag.style.borderColor = ti.b;
}

function setCount(n) {
  N = n; selected = 0;
  document.querySelectorAll('.ctab').forEach((btn, i) => {
    btn.classList.toggle('active', [5,10,15,20][i] === n);
  });
  buildRing(); updateSlotContent(); updateInfo();
}

initSlots(); buildRing(); updateSlotContent(); updateInfo();
</script>
</body>
</html>
