<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <!-- Night sky gradient -->
    <radialGradient id="skyGradient" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#16213e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f0f1e;stop-opacity:1" />
    </radialGradient>

    <!-- Tower gradient -->
    <linearGradient id="towerGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a5568;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d3748;stop-opacity:1" />
    </linearGradient>

    <!-- Moon glow -->
    <radialGradient id="moonGlow" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#ffd700;stop-opacity:0.8" />
      <stop offset="40%" style="stop-color:#ffa500;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#ff8c00;stop-opacity:0" />
    </radialGradient>

    <!-- Clock glow -->
    <radialGradient id="clockGlow" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:0.9" />
      <stop offset="50%" style="stop-color:#ee5a6f;stop-opacity:0.5" />
      <stop offset="100%" style="stop-color:#c44569;stop-opacity:0" />
    </radialGradient>

    <!-- Mystery purple gradient -->
    <linearGradient id="mysteryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:0.6" />
      <stop offset="50%" style="stop-color:#764ba2;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#f093fb;stop-opacity:0.3" />
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="1" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Shadow filter -->
    <filter id="shadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.5"/>
      <feOffset dx="0" dy="1" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.5"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <circle cx="32" cy="32" r="32" fill="url(#skyGradient)"/>

  <!-- Stars -->
  <circle cx="12" cy="10" r="0.8" fill="#ffffff" opacity="0.9">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="50" cy="8" r="0.6" fill="#ffffff" opacity="0.8">
    <animate attributeName="opacity" values="0.3;0.9;0.3" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="55" cy="20" r="0.7" fill="#ffffff" opacity="0.7">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="8" cy="25" r="0.5" fill="#ffffff" opacity="0.6">
    <animate attributeName="opacity" values="0.5;0.8;0.5" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="18" cy="18" r="0.6" fill="#ffd700" opacity="0.8">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="4.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="48" cy="15" r="0.5" fill="#ffd700" opacity="0.7">
    <animate attributeName="opacity" values="0.3;0.9;0.3" dur="6s" repeatCount="indefinite"/>
  </circle>

  <!-- Moon with glow -->
  <circle cx="48" cy="16" r="8" fill="url(#moonGlow)" opacity="0.4"/>
  <circle cx="48" cy="16" r="5" fill="#ffd700" filter="url(#glow)"/>
  <circle cx="50" cy="14" r="4.5" fill="#fff8dc" opacity="0.3"/>

  <!-- Mystery mist -->
  <ellipse cx="32" cy="50" rx="28" ry="8" fill="url(#mysteryGradient)" opacity="0.4">
    <animate attributeName="opacity" values="0.2;0.5;0.2" dur="8s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Clock Tower Base -->
  <rect x="26" y="42" width="12" height="18" fill="url(#towerGradient)" filter="url(#shadow)"/>
  <rect x="25" y="42" width="1" height="18" fill="#5a6c7d" opacity="0.5"/>
  <rect x="38" y="42" width="1" height="18" fill="#1a202c" opacity="0.5"/>

  <!-- Tower middle section -->
  <polygon points="24,42 40,42 38,32 26,32" fill="url(#towerGradient)" filter="url(#shadow)"/>
  <line x1="26" y1="42" x2="28" y2="32" stroke="#5a6c7d" stroke-width="0.5" opacity="0.3"/>
  <line x1="38" y1="42" x2="36" y2="32" stroke="#1a202c" stroke-width="0.5" opacity="0.5"/>

  <!-- Tower upper section -->
  <rect x="27" y="25" width="10" height="7" fill="url(#towerGradient)" filter="url(#shadow)"/>
  <rect x="26.5" y="25" width="1" height="7" fill="#5a6c7d" opacity="0.5"/>

  <!-- Tower top -->
  <polygon points="22,25 42,25 39,18 25,18" fill="url(#towerGradient)" filter="url(#shadow)"/>

  <!-- Spire -->
  <polygon points="29,18 35,18 32,10" fill="#4a5568" filter="url(#shadow)"/>
  <polygon points="30,18 34,18 32,11" fill="#5a6c7d" opacity="0.6"/>
  <circle cx="32" cy="10" r="1.5" fill="#ffd700" filter="url(#glow)">
    <animate attributeName="opacity" values="0.7;1;0.7" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- Main clock face with glow -->
  <circle cx="32" cy="37" r="7" fill="url(#clockGlow)" opacity="0.5"/>
  <circle cx="32" cy="37" r="5.5" fill="#2d3748" filter="url(#shadow)"/>
  <circle cx="32" cy="37" r="5" fill="#1a202c" stroke="#ff6b6b" stroke-width="0.8" filter="url(#glow)"/>

  <!-- Clock numbers (Roman numerals style marks) -->
  <line x1="32" y1="33" x2="32" y2="34" stroke="#ff6b6b" stroke-width="0.8" opacity="0.8"/>
  <line x1="36" y1="37" x2="35" y2="37" stroke="#ff6b6b" stroke-width="0.8" opacity="0.8"/>
  <line x1="32" y1="41" x2="32" y2="40" stroke="#ff6b6b" stroke-width="0.8" opacity="0.8"/>
  <line x1="28" y1="37" x2="29" y2="37" stroke="#ff6b6b" stroke-width="0.8" opacity="0.8"/>

  <!-- Clock hands with glow -->
  <line x1="32" y1="37" x2="32" y2="33.5" stroke="#ffd700" stroke-width="1" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="32" y1="37" x2="34.5" y2="37" stroke="#ffd700" stroke-width="1" stroke-linecap="round" filter="url(#glow)"/>
  <circle cx="32" cy="37" r="0.8" fill="#ff6b6b" filter="url(#glow)"/>

  <!-- Windows with light -->
  <rect x="30" y="48" width="1.5" height="2.5" fill="#ffd700" opacity="0.8">
    <animate attributeName="opacity" values="0.5;0.9;0.5" dur="4s" repeatCount="indefinite"/>
  </rect>
  <rect x="32.5" y="48" width="1.5" height="2.5" fill="#ffd700" opacity="0.7">
    <animate attributeName="opacity" values="0.4;0.8;0.4" dur="5s" repeatCount="indefinite"/>
  </rect>
  <rect x="30" y="52" width="1.5" height="2.5" fill="#ffd700" opacity="0.6">
    <animate attributeName="opacity" values="0.3;0.7;0.3" dur="6s" repeatCount="indefinite"/>
  </rect>
  <rect x="32.5" y="52" width="1.5" height="2.5" fill="#ffd700" opacity="0.8">
    <animate attributeName="opacity" values="0.5;0.9;0.5" dur="4.5s" repeatCount="indefinite"/>
  </rect>
</svg>
