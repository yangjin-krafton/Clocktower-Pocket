<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Clocktower Pocket — 호스트</title>
<link rel="icon" href="asset/favicon.svg" type="image/svg+xml">
<link rel="stylesheet" href="css/theme.css">
<style>
  .app-header {
    flex-shrink: 0;
    padding: 10px 16px 8px;
    border-bottom: 1px solid var(--lead2);
    position: relative;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .app-header::after {
    content: '';
    position: absolute;
    bottom: -1px; left: 8%; right: 8%;
    height: 1px;
    background: linear-gradient(90deg,
      transparent, var(--bl-dark) 12%, var(--pu-base) 30%,
      var(--tl-base) 50%, var(--pu-base) 70%, var(--rd-dark) 88%, transparent
    );
  }
  .app-header__logo { font-size: 1.2rem; }
  .app-header__title {
    font-family: 'Noto Serif KR', serif;
    font-size: 0.9rem;
    font-weight: 700;
    color: var(--gold2);
    flex: 1;
  }
  .app-header__badge {
    font-size: 0.6rem;
    padding: 2px 7px;
    border-radius: 8px;
    background: rgba(110,27,31,0.2);
    border: 1px solid rgba(110,27,31,0.4);
    color: var(--rd-light);
  }
</style>
</head>
<body>

<div class="app" id="app">
  <div class="status-bar">
    <span id="status-time">--:--</span>
    <span style="font-size:0.85rem;">📶 🔋</span>
  </div>

  <div class="app-header">
    <span class="app-header__logo">🏰</span>
    <span class="app-header__title">Clocktower Pocket</span>
    <span class="app-header__badge">호스트</span>
  </div>

  <div class="page-content" id="app-content">
    <div style="text-align:center;padding:60px 20px;color:var(--text3)">
      <div style="font-size:2rem;margin-bottom:12px">⏳</div>
      <div>초기화 중...</div>
    </div>
  </div>
</div>

<script>
  function updateClock() {
    const now = new Date()
    document.getElementById('status-time').textContent =
      now.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' })
  }
  updateClock()
  setInterval(updateClock, 30000)
</script>

<script type="module" src="js/host/app.js"></script>
</body>
</html>
