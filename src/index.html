<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clocktower Pocket</title>
<link rel="icon" href="asset/favicon.svg" type="image/svg+xml">
<link rel="stylesheet" href="css/theme.css?v=0.3">
<link rel="stylesheet" href="css/effects.css?v=0.3">
<link rel="stylesheet" href="css/seat-slot.css?v=0.3">
<style>
  /* ── 랜딩 화면 ── */
  .landing {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px 32px;
    gap: 6px;
  }
  .landing__logo {
    font-size: clamp(2.4rem, 7vw, 3.2rem);
    filter: drop-shadow(0 0 16px rgba(212,168,40,0.4));
  }
  .landing__title {
    font-family: 'Noto Serif KR', serif;
    font-size: clamp(1.2rem, 4vw, 1.6rem);
    font-weight: 700;
    color: var(--gold2);
    text-shadow: 0 0 24px rgba(212,168,40,0.3);
    margin-top: 4px;
  }
  .landing__sub {
    font-size: clamp(0.68rem, 2vw, 0.82rem);
    color: var(--text3);
    margin-bottom: 28px;
  }
  .landing__cards {
    width: 100%;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px;
  }
  .landing__card {
    background: var(--surface);
    border-radius: var(--radius-lg);
    border: 1px solid var(--lead2);
    padding: 28px 16px 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    transition: transform 0.18s, border-color 0.18s, box-shadow 0.18s;
    text-align: center;
  }
  .landing__card:active { transform: scale(0.97); }
  .landing__card--host:hover {
    border-color: var(--rd-light);
    box-shadow: 0 0 20px rgba(110,27,31,0.3);
    transform: translateY(-3px);
  }
  .landing__card--player:hover {
    border-color: var(--bl-light);
    box-shadow: 0 0 20px rgba(46,74,143,0.3);
    transform: translateY(-3px);
  }
  .landing__card-icon { font-size: 2.4rem; }
  .landing__card-title {
    font-family: 'Noto Serif KR', serif;
    font-size: 0.92rem;
    font-weight: 700;
    color: var(--text);
  }
  .landing__card-desc {
    font-size: 0.68rem;
    color: var(--text3);
    line-height: 1.4;
  }
  .landing__card--host .landing__card-title { color: var(--rd-light); }
  .landing__card--player .landing__card-title { color: var(--bl-light); }

  .landing__divider {
    width: 100%;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--lead2), transparent);
    margin: 20px 0 16px;
  }
  .landing__tip {
    font-size: 0.68rem;
    color: var(--text4);
    text-align: center;
    line-height: 1.6;
  }
</style>
</head>
<body>

<div class="app" id="app">
  <div id="lobby-banner"></div>

  <div class="page-content" id="app-content">
    <div style="text-align:center;padding:60px 20px;color:var(--text3)">
      <div style="font-size:2rem;margin-bottom:12px">⏳</div>
      <div>초기화 중...</div>
    </div>
  </div>

  <div class="tab-bar" id="tab-bar" style="display:none"></div>
</div>

<script type="module" src="js/app.js?v=0.3"></script>
</body>
</html>
