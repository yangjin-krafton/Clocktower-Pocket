<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Clocktower Pocket</title>
<link rel="icon" href="asset/favicon.svg" type="image/svg+xml">
<link rel="stylesheet" href="css/theme.css">
<style>
  .app-header {
    flex-shrink: 0;
    padding: 10px 16px 8px;
    border-bottom: 1px solid var(--lead2);
    position: relative;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .app-header::after {
    content: '';
    position: absolute;
    bottom: -1px; left: 8%; right: 8%;
    height: 1px;
    background: linear-gradient(90deg,
      transparent, var(--bl-dark) 12%, var(--pu-base) 30%,
      var(--tl-base) 50%, var(--pu-base) 70%, var(--rd-dark) 88%, transparent
    );
  }
  .app-header__logo  { font-size: 1.2rem; }
  .app-header__title {
    font-family: 'Noto Serif KR', serif;
    font-size: 0.9rem;
    font-weight: 700;
    color: var(--gold2);
    flex: 1;
  }
  .app-header__badge {
    font-size: 0.6rem;
    padding: 2px 7px;
    border-radius: 8px;
    display: none;
  }
  .app-header__badge.badge--host {
    background: rgba(110,27,31,0.2);
    border: 1px solid rgba(110,27,31,0.4);
    color: var(--rd-light);
  }
  .app-header__badge.badge--player {
    background: rgba(46,74,143,0.2);
    border: 1px solid rgba(46,74,143,0.4);
    color: var(--bl-light);
  }

  /* ── 랜딩 화면 ── */
  .landing {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px 32px;
    gap: 6px;
  }
  .landing__logo {
    font-size: 3rem;
    filter: drop-shadow(0 0 16px rgba(212,168,40,0.4));
  }
  .landing__title {
    font-family: 'Noto Serif KR', serif;
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--gold2);
    text-shadow: 0 0 24px rgba(212,168,40,0.3);
    margin-top: 4px;
  }
  .landing__sub {
    font-size: 0.72rem;
    color: var(--text3);
    margin-bottom: 28px;
  }
  .landing__cards {
    width: 100%;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .landing__card {
    background: var(--surface);
    border-radius: var(--radius-lg);
    border: 1px solid var(--lead2);
    padding: 28px 16px 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    transition: transform 0.18s, border-color 0.18s, box-shadow 0.18s;
    text-align: center;
  }
  .landing__card:active { transform: scale(0.97); }
  .landing__card--host:hover {
    border-color: var(--rd-light);
    box-shadow: 0 0 20px rgba(110,27,31,0.3);
    transform: translateY(-3px);
  }
  .landing__card--player:hover {
    border-color: var(--bl-light);
    box-shadow: 0 0 20px rgba(46,74,143,0.3);
    transform: translateY(-3px);
  }
  .landing__card-icon { font-size: 2.4rem; }
  .landing__card-title {
    font-family: 'Noto Serif KR', serif;
    font-size: 0.92rem;
    font-weight: 700;
    color: var(--text);
  }
  .landing__card-desc {
    font-size: 0.68rem;
    color: var(--text3);
    line-height: 1.4;
  }
  .landing__card--host .landing__card-title { color: var(--rd-light); }
  .landing__card--player .landing__card-title { color: var(--bl-light); }

  .landing__divider {
    width: 100%;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--lead2), transparent);
    margin: 20px 0 16px;
  }
  .landing__tip {
    font-size: 0.68rem;
    color: var(--text4);
    text-align: center;
    line-height: 1.6;
  }
</style>
</head>
<body>

<div class="app" id="app">
  <div class="status-bar">
    <span id="status-time">--:--</span>
    <span style="font-size:0.85rem;">📶 🔋</span>
  </div>

  <div class="app-header">
    <span class="app-header__logo">🏰</span>
    <span class="app-header__title">Clocktower Pocket</span>
    <span class="app-header__badge" id="app-badge"></span>
  </div>

  <div class="page-content" id="app-content">
    <div style="text-align:center;padding:60px 20px;color:var(--text3)">
      <div style="font-size:2rem;margin-bottom:12px">⏳</div>
      <div>초기화 중...</div>
    </div>
  </div>

  <div class="tab-bar" id="tab-bar" style="display:none"></div>
</div>

<script>
  function updateClock() {
    const now = new Date()
    document.getElementById('status-time').textContent =
      now.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' })
  }
  updateClock()
  setInterval(updateClock, 30000)
</script>

<script type="module" src="js/app.js"></script>
</body>
</html>
